name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # 12 saatte bir yenile
  workflow_dispatch:          # elle de çalıştırabilirsin
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Novxi
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=5eead4&color_dots=2c3f4a,0e7490,14b8a6,22d3ee,5eead4&dark_mode=true

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
