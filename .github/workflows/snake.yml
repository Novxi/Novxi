name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # 12 saatte bir yenile
  workflow_dispatch:          # elle de çalıştırabilirsin
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Novxi
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=14B8A6&color_dots=0D1117,0e4429,14b8a6,0ea5e9,22d3ee

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
