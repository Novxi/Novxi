<svg xmlns="http://www.w3.org/2000/svg" width="920" height="440" viewBox="0 0 920 440" fill="none">
  <defs>
    <pattern id="scan" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="920" height="1" y="0" fill="#3affa3" opacity="0.035"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="0%" r="90%">
      <stop offset="0" stop-color="#0a1512" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="win"><rect x="10" y="10" width="900" height="420" rx="16"/></clipPath>
  </defs>

  <!-- pencere -->
  <rect x="10" y="10" width="900" height="420" rx="16" fill="#04070c" stroke="#3affa3" stroke-opacity="0.28"/>
  <g clip-path="url(#win)">
    <rect x="10" y="10" width="900" height="420" fill="url(#vig)"/>
    <rect x="10" y="10" width="900" height="420" fill="url(#scan)"/>
    <!-- başlık çubuğu -->
    <rect x="10" y="10" width="900" height="46" fill="#080d12"/>
    <circle cx="34" cy="33" r="7" fill="#ff5f57"/>
    <circle cx="58" cy="33" r="7" fill="#febc2e"/>
    <circle cx="82" cy="33" r="7" fill="#28c840"/>
    <text x="460" y="39" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" font-size="16" fill="#5b6b73">mertkaya@dev: ~/about</text>
    <line x1="10" y1="56" x2="910" y2="56" stroke="#3affa3" stroke-opacity="0.14"/>
    <!-- gövde -->
    <text x="40" y="110" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" font-size="21" opacity="0"><tspan fill="#3affa3">mertkaya@dev</tspan><tspan fill="#8fa3ad">:</tspan><tspan fill="#22d3ee">~</tspan><tspan fill="#22d3ee">$ </tspan><tspan fill="#cdd9e0">cat about.md</tspan><animate attributeName="opacity" values="0;1" dur="0.45s" begin="0.25s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.3 0 0.2 1"/><animateTransform attributeName="transform" type="translate" values="14 0;0 0" dur="0.45s" begin="0.25s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.3 0 0.2 1"/></text>
  <text x="40" y="170" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" font-size="21" opacity="0"><tspan fill="#2dd4bf">&gt; </tspan><tspan fill="#5eead4">Full-stack engineer</tspan><tspan fill="#8fa3ad"> — web, mobile &amp; desktop, end-to-end</tspan><animate attributeName="opacity" values="0;1" dur="0.45s" begin="0.57s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.3 0 0.2 1"/><animateTransform attributeName="transform" type="translate" values="14 0;0 0" dur="0.45s" begin="0.57s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.3 0 0.2 1"/></text>
  <text x="40" y="212" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" font-size="21" opacity="0"><tspan fill="#2dd4bf">&gt; </tspan><tspan fill="#8fa3ad">I design &amp; build </tspan><tspan fill="#5eead4">custom devices</tspan><tspan fill="#8fa3ad">, made to spec for clients</tspan><animate attributeName="opacity" values="0;1" dur="0.45s" begin="0.89s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.3 0 0.2 1"/><animateTransform attributeName="transform" type="translate" values="14 0;0 0" dur="0.45s" begin="0.89s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.3 0 0.2 1"/></text>
  <text x="40" y="254" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" font-size="21" opacity="0"><tspan fill="#2dd4bf">&gt; </tspan><tspan fill="#5eead4">6 production products</tspan><tspan fill="#8fa3ad"> live for real businesses</tspan><animate attributeName="opacity" values="0;1" dur="0.45s" begin="1.21s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.3 0 0.2 1"/><animateTransform attributeName="transform" type="translate" values="14 0;0 0" dur="0.45s" begin="1.21s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.3 0 0.2 1"/></text>
  <text x="40" y="296" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" font-size="21" opacity="0"><tspan fill="#2dd4bf">&gt; </tspan><tspan fill="#8fa3ad">From idea to shipped product</tspan><tspan fill="#8fa3ad"> — design, code, deploy. </tspan><tspan fill="#22d3ee">Solo.</tspan><animate attributeName="opacity" values="0;1" dur="0.45s" begin="1.53s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.3 0 0.2 1"/><animateTransform attributeName="transform" type="translate" values="14 0;0 0" dur="0.45s" begin="1.53s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.3 0 0.2 1"/></text>
  <text x="40" y="338" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" font-size="21" opacity="0"><tspan fill="#2dd4bf">&gt; </tspan><tspan fill="#8fa3ad">I don&#x27;t just write code. </tspan><tspan fill="#5eead4">I ship things that work.</tspan><animate attributeName="opacity" values="0;1" dur="0.45s" begin="1.85s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.3 0 0.2 1"/><animateTransform attributeName="transform" type="translate" values="14 0;0 0" dur="0.45s" begin="1.85s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.3 0 0.2 1"/></text>
  <text x="40" y="398" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" font-size="21" opacity="0"><tspan fill="#3affa3">mertkaya@dev</tspan><tspan fill="#8fa3ad">:</tspan><tspan fill="#22d3ee">~</tspan><tspan fill="#22d3ee">$ </tspan><animate attributeName="opacity" values="0;1" dur="0.45s" begin="2.17s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.3 0 0.2 1"/><animateTransform attributeName="transform" type="translate" values="14 0;0 0" dur="0.45s" begin="2.17s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.3 0 0.2 1"/></text>
    <rect x="238" y="380" width="13" height="24" rx="2" fill="#3affa3" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.49s" fill="freeze"/><animate attributeName="opacity" values="1;1;0;0" dur="1.1s" begin="2.69s" repeatCount="indefinite" keyTimes="0;0.5;0.5;1"/></rect>
  </g>
</svg>